{{ define "main" }}
  <h2>{{ .Title }}</h2>
  <ul>
    {{ if eq .Kind "taxonomy" }}
      {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    {{ else }}
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          <small> - {{ .Date.Format "2006-01-02" }}</small>
        </li>
      {{ else }}
        <li>No posts yet.</li>
      {{ end }}
    {{ end }}
  </ul>
{{ end }}
