{{ define "main" }}
  <h2>{{ .Title }}</h2>
  <ul>
    {{ range .Pages.ByDate.Reverse }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <small> - {{ .Date.Format "2006-01-02" }}</small>
      </li>
    {{ else }}
      <li>No posts yet.</li>
    {{ end }}
  </ul>
{{ end }}
