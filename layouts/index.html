{{ define "main" }}
  <h2>Recent Posts</h2>
  <ul>
    {{ range where .Site.RegularPages "Type" "blog" }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <small> - {{ .Date.Format "2006-01-02" }}</small>
      </li>
    {{ else }}
      <li>No blog posts found.</li>
    {{ end }}
  </ul>
{{ end }}
